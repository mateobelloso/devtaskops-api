name: CI Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:

  test:

    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16

        env:
          POSTGRES_DB: devtaskops
          POSTGRES_USER: devops
          POSTGRES_PASSWORD: devops

        ports:
          - 5432:5432

        options: >-
          --health-cmd="pg_isready -U devops"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://devops:devops@localhost:5432/devtaskops?schema=public

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run migrations
        run: npx prisma migrate deploy

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build project
        run: npm run build

      - name: Build Docker image
        run: docker build -t devtaskops-api .
      
      - name: Run Snyk security scan
        uses: snyk/actions/node@master

        env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

        with:
        command: test